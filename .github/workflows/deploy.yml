name: Spring Boot Deploy to EC2

# 메인 브랜치에 push 될 때만 작동하도록 설정
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 내 코드 가져오기 (Checkout)
        uses: actions/checkout@v3

      - name: 2. JDK 17 환경 설정
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: 3. Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: 4. Spring Boot 애플리케이션 빌드 (테스트 제외)
        run: ./gradlew clean build -x test

      # 와일드카드 문제를 막기 위해 파일명을 고정합니다.
      - name: 5. 빌드 파일 이름 변경
        run: mv build/libs/*SNAPSHOT.jar build/libs/app.jar

      - name: 6. 빌드된 파일(.jar)을 EC2로 전송
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/app.jar" # 고정된 이름으로 전송
          target: "/home/ubuntu/develop" # EC2에 파일이 저장될 위치

      - name: 7. EC2에 접속해서 기존 서버 끄고 새 서버 실행
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/develop
            
            echo "기존 서버를 안전하게 종료합니다."
            sudo fuser -k -n tcp 8080 || true
            
            # 포트가 완전히 해제될 때까지 5초 대기
            sleep 5
            
            # .env 환경변수 적용 
            set -a
            source .env
            set +a
            
            echo "새로운 서버를 백그라운드에서 실행합니다."
            # 고정된 이름의 app.jar를 실행
            nohup java -jar build/libs/app.jar > app.log 2>&1 &
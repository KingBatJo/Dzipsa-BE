name: Spring Boot Deploy to EC2

# 메인 브랜치에 push 될 때만 작동하도록 설정
on:
  push:
    branches: [ "main" ] # 본인의 기본 브랜치명(master 등)에 맞게 수정하세요!

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 내 코드 가져오기 (Checkout)
        uses: actions/checkout@v3

      - name: 2. JDK 17 환경 설정
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: 3. Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: 4. Spring Boot 애플리케이션 빌드 (테스트 제외)
        run: ./gradlew clean build -x test

      - name: 5. 빌드된 파일(.jar)을 EC2로 전송
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*SNAPSHOT.jar"
          target: "/home/ubuntu/develop" # EC2에 파일이 저장될 위치

      - name: 6. EC2에 접속해서 기존 서버 끄고 새 서버 실행
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/develop
            
            # 기존에 8080 포트에서 실행 중인 서버가 있다면 안전하게 종료
            sudo fuser -k -n tcp 8080 || true
            
            # .env 환경변수 적용
            set -a
            source .env
            set +a
            
            # 새롭게 전송받은 jar 파일 백그라운드 실행
            nohup java -jar build/libs/*SNAPSHOT.jar > app.log 2>&1 &
